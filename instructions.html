<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>How to Use Your NAD+ Doselet™ — Doselets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --blue: #005E92;
  --blue-dark: #004E78;
  --ink: #05070A;
  --text: #2F3741;
  --muted: #667382;
  --paper: #FFFFFF;
  --wash: #F7FAFC;
  --shadow: 0 24px 70px rgba(7, 30, 44, 0.08);
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 84% 12%, rgba(0, 94, 146, 0.08), transparent 26%),
    linear-gradient(180deg, #FFFFFF 0%, #F8FBFD 44%, #FFFFFF 100%);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  max-width: 100%;
  display: block;
}

h1, h2, .eyebrow, .nav-links, .btn {
  font-family: Montserrat, Helvetica, Arial, sans-serif;
}

.wrap {
  width: min(1160px, calc(100% - 48px));
  margin: 0 auto;
}

.nav {
  height: 82px;
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(0, 94, 146, 0.10);
}

.nav-inner {
  height: 100%;
  width: min(1240px, calc(100% - 48px));
  margin: 0 auto;
  display: grid;
  grid-template-columns: 180px 1fr auto;
  align-items: center;
  gap: 28px;
}

.logo-img {
  display: block;
  width: auto;
  height: 38px;
  max-width: 250px;
  object-fit: contain;
}

.nav-links {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 34px;
  font-size: 14px;
  font-weight: 650;
}

.nav-links a {
  color: var(--text);
  position: relative;
  padding: 10px 0;
}

.nav-links a:hover {
  color: var(--blue);
}

.btn {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  min-height: 48px;
  padding: 0 24px;
  background: var(--blue);
  color: #fff;
  border: 1px solid var(--blue);
  font-size: 14px;
  font-weight: 750;
  box-shadow: 0 18px 36px rgba(0, 94, 146, .18);
}

.hero {
  padding: 64px 0 32px;
  text-align: center;
}

.eyebrow {
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: .12em;
  font-size: 12px;
  font-weight: 800;
  display: inline-flex;
  margin-bottom: 16px;
}

h1 {
  font-size: clamp(34px, 4vw, 56px);
  line-height: 1.05;
  font-weight: 850;
  letter-spacing: -0.01em;
}

.hero p {
  max-width: 680px;
  margin: 18px auto 0;
  color: var(--muted);
  font-size: 17px;
  line-height: 1.7;
}

.instructions-card {
  width: min(1080px, calc(100% - 48px));
  margin: 38px auto 86px;
  background: #fff;
  border: 1px solid #E8F0F5;
  border-radius: 28px;
  box-shadow: var(--shadow);
  overflow: hidden;
  padding: 24px;
}

.instructions-card img {
  width: 100%;
  height: auto;
  border-radius: 20px;
}

.footer {
  padding: 44px 0;
  background: #fff;
  border-top: 1px solid #E8F0F5;
}

.footer-inner {
  display: flex;
  align-items: center;
  gap: 54px;
}

.footer-info {
  border-left: 1px solid rgba(0,94,146,.38);
  padding-left: 38px;
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
}

@media (max-width: 980px) {
  .nav {
    height: auto;
    padding: 16px 0;
  }

  .nav-inner {
    grid-template-columns: auto auto;
    width: min(100% - 32px, 1240px);
  }

  .nav-links {
    order: 3;
    grid-column: 1 / -1;
    justify-content: flex-start;
    gap: 18px;
    overflow-x: auto;
  }

  .hero {
    padding: 44px 0 24px;
  }

  .instructions-card {
    padding: 14px;
    border-radius: 22px;
    margin-bottom: 56px;
  }
}

@media (max-width: 640px) {
  .wrap,
  .instructions-card {
    width: min(100% - 32px, 1160px);
  }

  .nav .btn {
    width: 100%;
    grid-column: 1 / -1;
  }

  .footer-inner {
    flex-direction: column;
    align-items: flex-start;
  }

  .footer-info {
    padding-left: 22px;
  }
}
</style>
</head>

<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" aria-label="Doselets home">
      <img class="logo-img" src="doselets-logo-full.png" alt="Doselets">
    </a>

    <div class="nav-links" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="contact.html">Contact Us</a>
    </div>

    <a class="btn" href="early-access.html">Early Access Program</a>
  </div>
</nav>

<main>
  <section class="hero">
    <div class="wrap">
      <span class="eyebrow">NAD+ Doselet™ Directions</span>
      <h1>How to Use Your NAD+ Doselet™</h1>
      <p>Once daily, or as directed by your practitioner.</p>
    </div>
  </section>

  <section class="instructions-card" aria-label="NAD+ Doselet instructions infographic">
    <img src="nad-doselet-instructions.png" alt="How to use your NAD+ Doselet instructions infographic">
  </section>
</main>

<footer class="footer">
  <div class="wrap footer-inner">
    <a href="index.html" aria-label="Doselets home">
      <img class="logo-img" src="doselets-logo-full.png" alt="Doselets">
    </a>

    <div class="footer-info">
      <div>Doselets by Nexture Bio</div>
      <div>Vacaville, CA</div>
      <div>hello@doselets.com</div>
    </div>
  </div>
</footer>

</body>
</html>
